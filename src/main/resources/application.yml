spring:
  config:
    import: "optional:file:.env[.properties]"
  application:
    name: pi-system
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}

  datasource:
    url: ${DB_URL:jdbc:mysql://localhost:3306/pisystem}
    username: ${DB_USER:root}
    password: ${DB_PASSWORD:}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      auto-commit: false  # Required for Hibernate transaction management
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 20000
      idle-timeout: 300000
      max-lifetime: 1200000

  jpa:
    open-in-view: false  # Disable to prevent connection leaks
    properties:
      hibernate:
        jdbc:
          batch_size: 20
        order_inserts: true
        order_updates: true

  flyway:
    enabled: true
    locations: classpath:db/migration
    out-of-order: false
    baseline-on-migrate: false

  servlet:
    multipart:
      enabled: true
      max-file-size: 10MB
      max-request-size: 10MB
      file-size-threshold: 2KB

  task:
    scheduling:
      enabled: true
      pool:
        size: 5

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}

  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_CLIENT_ID:dev-client-id}
            client-secret: ${GOOGLE_CLIENT_SECRET:dev-client-secret}
            scope: profile,email

jwt:
  secret: ${JWT_SECRET:default-secret-key-for-dev-only-change-in-prod}
  expiration: ${JWT_EXPIRATION:86400000}
  refresh-token:
    expiration: ${JWT_REFRESH_TOKEN_EXPIRATION:604800000}

aa:
  mode: ${AA_MODE:sandbox}

external:
  service:
    mfapi:
      base-url: https://api.mfapi.in

# Email configuration
  mail:
    host: ${MAIL_HOST:smtp.gmail.com}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
            required: true
          connectiontimeout: 5000
          timeout: 5000
          writetimeout: 5000
    from-email: ${MAIL_FROM:noreply@pi-system.com}
    enabled: ${MAIL_ENABLED:true}

server:
  port: ${PORT:8080}

springdoc:
  swagger-ui:
    path: /swagger-ui.html
    operationsSorter: alpha
    tagsSorter: alpha
    display-request-duration: true
    doc-expansion: none
    default-models-expand-depth: -1
  api-docs:
    path: /v3/api-docs

# Advanced Features Configuration
document:
  upload:
    dir: ${DOCUMENT_UPLOAD_DIR:./uploads/documents}
  max:
    size: ${DOCUMENT_MAX_SIZE:10485760}  # 10MB in bytes

# Logging Configuration
logging:
  level:
    com.investments.stocks: INFO
    com.investments.stocks.scheduler: DEBUG
    org.springframework.scheduling: INFO

# ============================================================================
# MIGRATION SYSTEM CONFIGURATION
# ============================================================================
migration:
  # Baseline generation
  baseline-enabled: false
  baseline-file-name: V1__baseline.sql
  
  # Validation
  validation-enabled: true
  fail-on-validation-error: false  # Set to true after first successful migration
  
  # Schema drift detection
  drift-detection-enabled: true
  fail-on-drift: false
  
  # Modular migrations
  modular-enabled: false
  modules: []
  
  # Execution mode
  async-execution: false
  long-running-threshold-seconds: 30
  
  # Safety checks
  backward-compatibility-checks: true
  allow-destructive-operations: false
  
  # Archival
  archival-enabled: false
  archive-after-days: 365
  archive-directory: archive
  repeatable-directory: repeatable
